<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 背景ラベル: 標準化機関 -->
  <rect x="30" y="20" width="280" height="200" rx="14" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text font-size="12" x="170" y="38" text-anchor="middle" fill="#777777">標準化機関（ANSI/ISO）</text>

  <!-- ANSI/ISO SQL標準 -->
  <rect x="50" y="50" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="170" y="75" text-anchor="middle" fill="#0C447C">ANSI X3.135 / ISO 9075</text>
  <text font-size="12" x="170" y="93" text-anchor="middle" fill="#185FA5">SQL-86 → SQL-89 → SQL-92...</text>

  <!-- embedded SQL言語対応 -->
  <rect x="50" y="130" width="240" height="58" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="170" y="150" text-anchor="middle" fill="#444441">embedded SQL 言語対応</text>
  <text font-size="11" x="170" y="166" text-anchor="middle" fill="#5F5E5A">COBOL / FORTRAN / Pascal / PL/I</text>
  <text font-size="11" x="170" y="180" text-anchor="middle" fill="#5F5E5A">→ +Ada / C (SQL-89)</text>
  <line x1="170" y1="106" x2="170" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SAG 背景 -->
  <rect x="370" y="20" width="280" height="200" rx="14" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text font-size="12" x="510" y="38" text-anchor="middle" fill="#777777">業界コンソーシアム（SAG）</text>

  <!-- SQL Access Group -->
  <rect x="390" y="50" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="510" y="75" text-anchor="middle" fill="#085041">SQL Access Group</text>
  <text font-size="12" x="510" y="93" text-anchor="middle" fill="#0F6E56">1989年設立 Oracle・Informix・HP他</text>

  <!-- SAG CLI -->
  <rect x="390" y="130" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="510" y="148" text-anchor="middle" fill="#085041">SAG CLI 仕様策定</text>
  <text font-size="12" x="510" y="163" text-anchor="middle" fill="#0F6E56">1990年〜 対象言語: C / COBOL のみ</text>
  <line x1="510" y1="106" x2="510" y2="130" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 並行・独立の点線 -->
  <line x1="290" y1="78" x2="390" y2="78" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-size="11" x="340" y="70" text-anchor="middle" fill="#999999">並行・独立</text>

  <!-- SAGがISO/ANSIへ提出 -->
  <path d="M510 174 L510 240 L340 240" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="11" x="510" y="232" text-anchor="middle" fill="#999999">1993年 ISO/ANSIへ提出</text>

  <!-- Microsoft ODBC 1.0 -->
  <rect x="390" y="270" width="240" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="510" y="292" text-anchor="middle" fill="#4A1B0C">Microsoft ODBC 1.0</text>
  <text font-size="12" x="510" y="308" text-anchor="middle" fill="#993C1D">1992年 SAG CLIを拡張・商用化</text>
  <line x1="510" y1="174" x2="510" y2="270" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X/Open CAE -->
  <rect x="50" y="270" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="170" y="292" text-anchor="middle" fill="#26215C">X/Open CAE 仕様</text>
  <text font-size="12" x="170" y="308" text-anchor="middle" fill="#534AB7">1994年 CLI を採択・拡張</text>
  <path d="M340 240 L170 240 L170 270" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ISO/IEC 9075-3 -->
  <rect x="200" y="390" width="280" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="412" text-anchor="middle" fill="#412402">ISO/IEC 9075-3 : 1995</text>
  <text font-size="12" x="340" y="428" text-anchor="middle" fill="#854F0B">SQL/CLI として正式標準化</text>
  <line x1="170" y1="326" x2="300" y2="390" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="326" x2="390" y2="390" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ODBC 3.0 -->
  <rect x="200" y="490" width="280" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="508" text-anchor="middle" fill="#4A1B0C">ODBC 3.0（1996年）</text>
  <text font-size="12" x="340" y="524" text-anchor="middle" fill="#993C1D">ISO CLI・SAG CLI と完全整合</text>
  <line x1="340" y1="446" x2="340" y2="490" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
